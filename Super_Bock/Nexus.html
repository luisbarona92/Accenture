<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus — HoReCa B2B Marketplace · Review Pack</title>
<meta name="description" content="Super Bock Group & Grupo Nabeiro (Delta) — Nexus B2B marketplace review pack: Portugal market & financial fact base, success cases, consortium model, and executive workshop agenda.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#E2001A;--brand-deep:#9E0712;--gold:#C9A24B;
  --ink:#1C1614;--paper:#FFFFFF;--cream:#FAF5EE;--muted:#6B6460;--line:#E8E0D7;
  --ok:#1E9E5A;--warn:#C8881A;--bad:#B23A48;
  --maxw:1120px;--r:16px;--r-sm:10px;
  --shadow:0 1px 2px rgba(28,22,20,.06),0 8px 28px rgba(28,22,20,.08);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;font-size:17px;line-height:1.6;font-feature-settings:"tnum" 1;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:"Archivo",sans-serif;letter-spacing:-.02em;line-height:1.05;margin:0}
p{margin:0 0 1em}
a{color:var(--brand);text-decoration:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
.eyebrow{font-family:"Archivo";font-weight:700;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--brand)}
.lead{color:var(--muted);font-size:1.12rem;max-width:66ch}
.unit{font-size:.46em;font-weight:700;margin-left:.1em}

/* flag chip */
.flagchip{display:inline-flex;align-items:center;gap:8px;background:var(--cream);border:1px solid var(--line);border-radius:999px;padding:5px 13px 5px 8px;font-family:"Archivo";font-weight:700;font-size:.74rem;letter-spacing:.04em;color:var(--ink)}
.flag{width:24px;height:16px;border-radius:2px;display:block;box-shadow:0 0 0 1px rgba(0,0,0,.08)}

/* nav */
.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav .wrap{display:flex;align-items:center;gap:16px;height:64px}
.nav-logo{height:30px;width:auto;display:block}
.nav-brand{display:flex;align-items:center;gap:13px}
.nav-div{width:1px;height:26px;background:var(--line)}
.nav-nexus{font-family:"Archivo";font-weight:800;font-size:1.05rem;letter-spacing:-.01em}
.nav-links{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.nav-links a{font-family:"Archivo";font-weight:600;font-size:.82rem;color:var(--muted);padding:7px 12px;border-radius:999px;transition:.18s}
.nav-links a:hover{color:var(--ink);background:var(--cream)}
.nav-links a.active{color:#fff;background:var(--brand)}

/* hero */
.hero{position:relative;overflow:hidden;color:#fff;background:radial-gradient(120% 120% at 18% 0%,#3A0C10 0%,#220609 55%,#160405 100%)}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(60% 80% at 85% 20%,rgba(226,0,26,.45),transparent 60%)}
.hero::after{content:"";position:absolute;inset:0;opacity:.05;background-image:radial-gradient(rgba(255,255,255,.9) 1px,transparent 1px);background-size:4px 4px}
.hero .wrap{position:relative;padding:104px 28px 88px}
.hero .kicker{color:var(--gold);font-family:"Archivo";font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-size:.8rem;margin-bottom:22px}
.hero h1{font-size:clamp(2.6rem,6vw,4.8rem);font-weight:900}
.hero h1 .em{background:linear-gradient(180deg,#FF5A4D,#E2001A);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{margin-top:22px;font-size:1.2rem;max-width:60ch;color:#F1E7DA}
.hero .meta{margin-top:30px;display:flex;gap:10px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.28);color:#fff;padding:7px 14px;border-radius:999px;font-family:"Archivo";font-weight:600;font-size:.82rem}
.tag .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.scrollcue{margin-top:44px;color:#C9B79E;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;font-family:"Archivo";font-weight:600}

/* sections */
section{padding:82px 0;border-bottom:1px solid var(--line)}
.sec-head{margin-bottom:38px}
.sec-head h2{font-size:clamp(1.8rem,3.6vw,2.7rem);font-weight:800;margin:12px 0 14px}
.sec-head .topline{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.surface{background:var(--cream)}
.sub-h{font-family:"Archivo";font-weight:700;font-size:1.15rem;margin:42px 0 8px;display:flex;align-items:center;gap:12px}

/* KPI */
.grouplabel{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-family:"Archivo";font-weight:700;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.kpi{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:22px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--gold)}
.kpi.feat{background:linear-gradient(165deg,#E2001A,#9E0712);color:#fff}
.kpi .num{font-family:"Archivo";font-weight:800;font-size:2.1rem;line-height:1;white-space:nowrap;letter-spacing:-.03em}
.kpi .lab{margin-top:10px;font-size:.92rem;color:var(--muted)}
.kpi.feat .lab{color:#F4E3D6}

/* callout */
.callout{background:var(--cream);border-left:4px solid var(--brand);border-radius:var(--r-sm);padding:20px 22px}
.callout.dark{background:linear-gradient(135deg,#2A0A0C,#160405);color:#F1E7DA;border-left-color:var(--gold)}
.callout h4{font-size:1.05rem;font-weight:700;margin-bottom:8px}
.callout.dark h4{color:#fff}
.callout ul{margin:.4em 0 0;padding-left:1.15em}.callout li{margin:.3em 0}

/* comparison table */
.cmpwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);background:var(--paper)}
table.cmp{border-collapse:collapse;width:100%;min-width:720px}
table.cmp thead th{background:var(--cream);text-align:left;padding:16px;border-bottom:2px solid var(--brand);vertical-align:middle}
table.cmp thead th.dim{font-family:"Archivo";font-weight:700;font-size:.95rem;color:var(--ink);width:24%}
table.cmp thead th img{height:26px;width:auto;display:block}
table.cmp tbody th{font-family:"Archivo";font-weight:600;font-size:.9rem;text-align:left;padding:13px 16px;border-top:1px solid var(--line);background:#FCFAF7;color:var(--ink);white-space:nowrap}
table.cmp tbody td{padding:13px 16px;border-top:1px solid var(--line);font-size:.92rem;vertical-align:top}
table.cmp tbody tr:nth-child(even) td,table.cmp tbody tr:nth-child(even) th{background:#FBF7F2}
.cdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-left:7px;vertical-align:middle}
.cdot.ok{background:var(--ok)}.cdot.warn{background:var(--warn)}.cdot.bad{background:var(--bad)}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-size:.82rem;color:var(--muted);align-items:center}
.legend span{display:inline-flex;align-items:center;gap:6px}
.tnote{font-size:.8rem;color:var(--muted);margin-top:10px;font-style:italic}

/* flip cards */
.cards5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.flip{height:360px;perspective:1300px;cursor:pointer;outline:none}
.flip:focus-visible{box-shadow:0 0 0 3px rgba(226,0,26,.4);border-radius:var(--r)}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.flip.flipped .flip-inner{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
.flip-front{background:var(--paper)}
.flip-front .strip{height:6px;background:var(--brand)}
.flip-front .fb{padding:20px 18px;display:flex;flex-direction:column;height:100%}
.flip-front .arche{font-size:.72rem;font-weight:700;color:var(--brand);font-family:"Archivo";letter-spacing:.04em;text-transform:uppercase}
.flip-front .nm{font-family:"Archivo";font-weight:800;font-size:1.32rem;margin:10px 0 6px;line-height:1.05}
.flip-front .type{font-size:.85rem;color:var(--muted)}
.flip-front .big{margin-top:auto;font-family:"Archivo";font-weight:800;font-size:1.7rem;color:var(--brand-deep);white-space:nowrap}
.flip-front .biglab{font-size:.74rem;color:var(--muted)}
.flip-front .hint{margin-top:12px;font-size:.72rem;font-weight:700;color:var(--gold);font-family:"Archivo";letter-spacing:.06em;text-transform:uppercase}
.flip-back{transform:rotateY(180deg);background:linear-gradient(165deg,#2A0A0C,#160405);color:#F1E7DA;padding:18px 17px;overflow:auto}
.flip-back .nm{font-family:"Archivo";font-weight:800;font-size:1.05rem;color:#fff;margin-bottom:8px}
.flip-back p{font-size:.82rem;line-height:1.5;margin:0 0 9px}
.flip-back .mk{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.flip-back .mk span{background:rgba(255,255,255,.1);border-radius:7px;padding:5px 8px;font-size:.74rem;font-weight:600}
.flip-back .why{color:var(--gold);font-weight:700;font-size:.78rem}
.flip-back .src{font-size:.66rem;color:#B79E8C;margin-top:8px}
.flip-chip{position:absolute;top:14px;right:14px}

/* generic cards / grid */
.grid{display:grid;gap:18px}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:24px;box-shadow:var(--shadow)}
.card h3{font-size:1.18rem;font-weight:700;margin-bottom:6px}
.card ul{margin:0;padding-left:1.1em}.card li{margin:.3em 0}
.card .top{height:5px;border-radius:5px;margin:-24px -24px 18px;background:var(--brand)}
.card .top.deep{background:var(--brand-deep)}.card .top.gold{background:var(--gold)}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:"Archivo";font-weight:600;font-size:.78rem;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--paper)}
.chip.ok{color:var(--ok);border-color:#BfE6CE;background:#EAF7F0}
.chip.warn{color:#9A6A12;border-color:#EBD9AF;background:#FBF2DD}
.chip.bad{color:var(--bad);border-color:#EBC9CD;background:#FBEDEF}
.chip.solid{background:var(--brand-deep);color:#fff;border-color:transparent}
.chipset{display:flex;gap:9px;flex-wrap:wrap}

/* consortium actor cards with logos */
.actor .lg{display:flex;align-items:center;gap:14px;min-height:42px;margin:-4px 0 14px}
.actor .lg img{height:30px;width:auto}
.actor .lgsep{width:1px;height:28px;background:var(--line)}
.actor .nexusmark{font-family:"Archivo";font-weight:900;font-size:1.5rem;letter-spacing:-.02em;color:var(--brand)}
.actor .nexusmark small{font-weight:700;font-size:.62rem;letter-spacing:.18em;color:var(--muted);display:block;text-transform:uppercase}
.role{font-family:"Archivo";font-weight:700;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--brand);margin-bottom:10px}

/* staircase (phased participation) */
.stair{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:end;margin-top:6px}
.stair .step{display:flex;flex-direction:column;justify-content:flex-end}
.stair .riser{border-radius:12px 12px 0 0;display:flex;align-items:flex-start;justify-content:space-between;padding:14px 16px;color:#fff}
.stair .s1 .riser{height:88px;background:linear-gradient(160deg,#E2001A,#B3000F)}
.stair .s2 .riser{height:128px;background:linear-gradient(160deg,#B3000F,#9E0712)}
.stair .s3 .riser{height:168px;background:linear-gradient(160deg,#C9A24B,#A07C2C)}
.stair .riser .n{font-family:"Archivo";font-weight:900;font-size:1.5rem;opacity:.9}
.stair .riser .tt{font-family:"Archivo";font-weight:800;font-size:1.02rem;text-align:right;align-self:flex-end}
.stair .body{border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;padding:16px;background:var(--paper);box-shadow:var(--shadow);min-height:118px}
.stair .body p{margin:0;font-size:.88rem;color:var(--muted)}
.axis{display:flex;align-items:center;gap:10px;margin-top:14px;color:var(--muted);font-family:"Archivo";font-weight:700;font-size:.78rem;letter-spacing:.04em}
.axis .bararrow{flex:1;height:3px;background:linear-gradient(90deg,var(--brand),var(--gold));border-radius:3px;position:relative}
.axis .bararrow::after{content:"";position:absolute;right:-2px;top:-3.5px;border-left:9px solid var(--gold);border-top:5px solid transparent;border-bottom:5px solid transparent}

/* sequence flow */
.flow{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:stretch;gap:12px;margin-top:6px}
.flow .node{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);position:relative}
.flow .node .nb{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-family:"Archivo";font-weight:800;color:#fff;background:var(--brand);margin-bottom:10px}
.flow .node:nth-child(3) .nb{background:var(--brand-deep)}.flow .node:nth-child(5) .nb{background:var(--gold);color:#3A0C10}
.flow .node h4{font-size:1rem;margin-bottom:4px}
.flow .node p{margin:0;font-size:.85rem;color:var(--muted)}
.flow .arr{display:grid;place-items:center;color:var(--brand);font-size:1.7rem;font-weight:800}

/* participation chips */
.princ{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:4px}
.princ .p{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px 16px;box-shadow:var(--shadow)}
.princ .p .ic{width:34px;height:34px;border-radius:9px;background:#FBEDEF;color:var(--brand);display:grid;place-items:center;font-weight:900;font-family:"Archivo";margin-bottom:10px}
.princ .p h4{font-size:.98rem;margin-bottom:4px}
.princ .p p{margin:0;font-size:.83rem;color:var(--muted)}

/* agenda timeline */
.tl{margin-top:8px;position:relative}
.slot{display:grid;grid-template-columns:120px 1fr;gap:20px;padding:0 0 22px}
.slot .time{font-family:"Archivo";font-weight:800;font-size:1rem;color:var(--brand-deep);padding-top:18px;text-align:right;white-space:nowrap}
.slot .body{position:relative;background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:var(--r);padding:16px 20px;box-shadow:var(--shadow)}
.slot.brk .body{border-left-color:var(--line);background:var(--cream);box-shadow:none}
.slot .body .ttl{font-family:"Archivo";font-weight:800;font-size:1.1rem;margin-bottom:3px}
.slot .body .obj{color:var(--muted);font-size:.92rem;margin-bottom:10px}
.slot .body .prompt{background:#FBEDEF;border-radius:var(--r-sm);padding:10px 13px;font-size:.9rem}
.slot .body .prompt b{color:var(--brand-deep)}
.fmt{display:inline-block;font-family:"Archivo";font-weight:700;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:999px;margin-bottom:10px}
.fmt.plenary{background:#FBEDEF;color:var(--brand-deep)}
.fmt.debate{background:#FBF2DD;color:#8A6310}
.fmt.breakout{background:#EFE7F7;color:#5B2E8A}
.fmt.decision{background:#EAF7F0;color:#147a44}

/* closing */
.closing{background:radial-gradient(120% 120% at 80% 0%,#3A0C10,#160405);color:#fff;text-align:center;border:none}
.closing h2{font-size:clamp(2rem,5vw,3.4rem);font-weight:900}
.closing .sig{margin-top:18px;color:#C9B79E;font-family:"Archivo";font-weight:600;letter-spacing:.04em}

/* reveal */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s,transform .7s}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}

/* responsive */
@media(max-width:1080px){.cards5{grid-template-columns:repeat(2,1fr)}.princ{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}.stair{grid-template-columns:1fr;align-items:stretch}.stair .riser{height:auto!important;min-height:64px}.flow{grid-template-columns:1fr}.flow .arr{transform:rotate(90deg)}.nav-links{display:none}}
@media(max-width:640px){.kpis{grid-template-columns:1fr}.cards5{grid-template-columns:1fr}.princ{grid-template-columns:1fr}.slot{grid-template-columns:64px 1fr;gap:12px}.slot .time{font-size:.82rem;padding-top:16px}.hero .wrap{padding:78px 22px 60px}}

/* print */
@media print{.nav,.scrollcue{display:none}.hero,.closing{background:#160405!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}section{padding:22px 0;border:none;break-inside:avoid}.reveal{opacity:1;transform:none}.flip{height:auto}.flip-inner{transform:none!important}.flip-back{position:static;transform:none;margin-top:8px}}
</style>

<style>
  #gate{position:fixed;inset:0;z-index:999;display:grid;place-items:center;padding:24px;
    background:radial-gradient(120% 120% at 18% 0%,#3A0C10,#220609 55%,#160405);}
  #gate .card{width:min(440px,100%);background:#fff;border-radius:18px;padding:38px 34px;
    box-shadow:0 30px 80px rgba(0,0,0,.45);text-align:center}
  #gate img{height:40px;margin-bottom:20px}
  #gate .k{font-family:"Archivo";font-weight:700;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--brand)}
  #gate h1{font-family:"Archivo";font-weight:800;font-size:1.7rem;margin:8px 0 6px;color:var(--ink)}
  #gate p{color:var(--muted);font-size:.96rem;margin:0 0 20px}
  #gate form{display:flex;flex-direction:column;gap:12px}
  #gate input{font-family:"Hanken Grotesk";font-size:1rem;padding:13px 15px;border:1px solid var(--line);border-radius:10px;outline:none}
  #gate input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(226,0,26,.15)}
  #gate button{font-family:"Archivo";font-weight:700;font-size:1rem;padding:13px;border:none;border-radius:10px;
    background:var(--brand);color:#fff;cursor:pointer;transition:.18s}
  #gate button:hover{background:var(--brand-deep)}
  #gate .err{color:var(--bad);font-size:.88rem;margin-top:12px}
  #gate .foot{margin-top:22px;font-size:.74rem;color:var(--muted);letter-spacing:.02em}
  #gate[hidden]{display:none}</style>
</head>
<body>

  var km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(P.salt),iterations:P.iters,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(P.iv)},key,b64d(P.ct));
  return new TextDecoder().decode(pt);
}
window.__unlock=async function(pw){
  try{
    var html=await _decrypt(pw);
    document.getElementById("app").innerHTML=html;
    document.getElementById("gate").hidden=true;
    initReport();
    window.scrollTo(0,0);
    return true;
  }catch(e){ document.getElementById("err").hidden=false; return false; }
};
document.getElementById("gform").addEventListener("submit",function(e){
  e.preventDefault();document.getElementById("err").hidden=true;
  window.__unlock(document.getElementById("pw").value);
});
function initReport(){
function fmt(v,dec){var s=dec>0?v.toFixed(dec):String(Math.round(v));var p=s.split(".");p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,",");return p.join(".");}
function countUp(el){var t=parseFloat(el.dataset.value),dec=parseInt(el.dataset.decimals||"0",10),pre=el.dataset.prefix||"",suf=el.dataset.suffix||"";
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  function paint(v){el.innerHTML=pre+fmt(v,dec)+(suf?'<span class="unit">'+suf+'</span>':"");}
  if(reduce){paint(t);return;} var s=null,d=1300;
  requestAnimationFrame(function f(ts){s=s||ts;var p=Math.min((ts-s)/d,1);paint(t*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(f);else paint(t);});}
var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add("in");
  e.target.querySelectorAll("[data-value]").forEach(function(n){if(!n.dataset.done){n.dataset.done="1";countUp(n);}});io.unobserve(e.target);}});},{threshold:.16});
document.querySelectorAll(".reveal").forEach(function(el){io.observe(el);});

/* flip cards */
function toggleFlip(c){c.classList.toggle("flipped");c.setAttribute("aria-pressed",c.classList.contains("flipped"));}
document.querySelectorAll(".flip").forEach(function(c){
  c.setAttribute("aria-pressed","false");
  c.addEventListener("click",function(){toggleFlip(c);});
  c.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();toggleFlip(c);}});
});

/* nav active */
var navmap={};document.querySelectorAll(".nav-links a").forEach(function(a){navmap[a.getAttribute("href").slice(1)]=a;});
var nio=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){
  Object.keys(navmap).forEach(function(k){navmap[k].classList.remove("active");});
  if(navmap[e.target.id])navmap[e.target.id].classList.add("active");}});},{rootMargin:"-45% 0px -50% 0px"});
document.querySelectorAll("section[id],header[id]").forEach(function(s){nio.observe(s);});
}
</script>
